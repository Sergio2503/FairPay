services:

  db:
    image: postgres:17
    container_name: fairpay-db
    restart: always

    environment:
      POSTGRES_DB: fairpay
      POSTGRES_USER: fairpay
      POSTGRES_PASSWORD: fairpay

    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fairpay"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend-fairpay
    container_name: fairpay-backend
    restart: always

    depends_on:
      db:
        condition: service_healthy

    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/fairpay
      DATABASE_USER: fairpay
      DATABASE_PASSWORD: fairpay

    ports:
      - "8080:8080"

  frontend:
    build: ./frontend-fairpay
    container_name: fairpay-frontend
    restart: always

    depends_on:
      - backend

    ports:
      - "4200:80"